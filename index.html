<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ライオンズクラブ 資料一覧</title>
<style>
  :root {
    --navy: #1a3a5c;
    --navy-deep: #122a44;
    --gold: #c9a356;
    --paper: #faf8f4;
    --ink: #2b2b2b;
    --ink-soft: #6b6b6b;
    --line: #e3ddd0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.7;
  }

  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
    color: #fff;
    padding: 56px 24px 64px;
    text-align: center;
    position: relative;
  }

  header::after {
    content: "";
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--gold), transparent, var(--gold));
  }

  .emblem {
    width: 52px;
    height: 52px;
    margin: 0 auto 18px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }

  header p {
    color: #cdd8e6;
    font-size: 14px;
    letter-spacing: 0.05em;
  }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  .intro {
    background: #fff;
    border: 1px solid var(--line);
    border-left: 4px solid var(--gold);
    padding: 20px 24px;
    margin-bottom: 36px;
    font-size: 14.5px;
    color: var(--ink-soft);
    border-radius: 2px;
  }

  .doc-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .doc-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 20px 22px;
    display: flex;
    align-items: center;
    gap: 18px;
    text-decoration: none;
    color: var(--ink);
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
  }

  .doc-card:hover {
    border-color: var(--gold);
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(26, 58, 92, 0.08);
  }

  .doc-icon {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }

  .icon-docx { background: #2b579a; }
  .icon-pdf  { background: #c0392b; }
  .icon-odt  { background: #5a8f6e; }
  .icon-xlsx { background: #1d6f42; }
  .icon-pptx { background: #b7472a; }
  .icon-file { background: #7a7a7a; }

  .doc-info { flex: 1; min-width: 0; }

  .doc-title {
    font-size: 15.5px;
    font-weight: 600;
    margin-bottom: 4px;
    word-break: break-word;
  }

  .doc-meta {
    font-size: 12.5px;
    color: var(--ink-soft);
  }

  .doc-action {
    flex-shrink: 0;
    font-size: 13px;
    color: var(--navy);
    border: 1px solid var(--navy);
    padding: 7px 16px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .doc-card:hover .doc-action {
    background: var(--navy);
    color: #fff;
  }

  .state-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-soft);
    font-size: 14px;
  }

  footer {
    text-align: center;
    padding: 32px 20px 48px;
    font-size: 12.5px;
    color: var(--ink-soft);
    border-top: 1px solid var(--line);
  }

  @media (max-width: 520px) {
    .doc-card { flex-wrap: wrap; }
    .doc-action { margin-left: 62px; }
  }
</style>
</head>
<body>

<header>
  <div class="emblem">🦁</div>
  <h1>ライオンズクラブ 資料一覧</h1>
  <p>ご覧になりたい資料をクリックしてください</p>
</header>

<main>
  <div class="intro">
    こちらは新クラブ設立に関する資料を一覧でご覧いただけるページです。<br>
    各資料名をクリックすると、ブラウザで開く、または保存（ダウンロード）ができます。<br>
    新しい資料は自動的にこの一覧へ追加されます。
  </div>

  <div class="doc-list" id="doc-list">
    <div class="state-msg">資料を読み込んでいます…</div>
  </div>
</main>

<footer>
  資料に関するお問い合わせは木元までご連絡ください
</footer>

<script>
  // ===== 設定 =====
  const OWNER = "daisenfoods-cloud";
  const REPO = "lions-club-docs";
  const BRANCH = "main";
  // index.html や README.md など、一覧に出したくないファイル名
  const EXCLUDE = ["index.html", "README.md", ".gitignore"];

  // 拡張子ごとのアイコン・表示名
  const FILE_TYPES = {
    docx: { icon: "icon-docx", label: "Word", text: "W" },
    doc:  { icon: "icon-docx", label: "Word", text: "W" },
    pdf:  { icon: "icon-pdf",  label: "PDF",  text: "P" },
    odt:  { icon: "icon-odt",  label: "OpenDocument", text: "O" },
    xlsx: { icon: "icon-xlsx", label: "Excel", text: "X" },
    pptx: { icon: "icon-pptx", label: "PowerPoint", text: "S" },
  };

  function getFileType(filename) {
    const ext = filename.split(".").pop().toLowerCase();
    return FILE_TYPES[ext] || { icon: "icon-file", label: ext.toUpperCase(), text: "?" };
  }

  function displayName(filename) {
    // 拡張子を除いたファイル名を表示名にする
    return filename.replace(/\.[^/.]+$/, "");
  }

  async function loadFiles() {
    const listEl = document.getElementById("doc-list");
    try {
      const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/contents/?ref=${BRANCH}`
      );
      if (!res.ok) throw new Error("読み込みに失敗しました");
      const items = await res.json();

      const files = items
        .filter(item => item.type === "file")
        .filter(item => !EXCLUDE.includes(item.name))
        .sort((a, b) => a.name.localeCompare(b.name, "ja"));

      if (files.length === 0) {
        listEl.innerHTML = `<div class="state-msg">資料はまだありません</div>`;
        return;
      }

      listEl.innerHTML = files.map(file => {
        const type = getFileType(file.name);
        const name = displayName(file.name);
        // ダウンロードURL（raw）
        const url = file.download_url;
        return `
          <a class="doc-card" href="${url}" download>
            <div class="doc-icon ${type.icon}">${type.text}</div>
            <div class="doc-info">
              <div class="doc-title">${name}</div>
              <div class="doc-meta">${type.label}</div>
            </div>
            <div class="doc-action">開く</div>
          </a>
        `;
      }).join("");

    } catch (err) {
      listEl.innerHTML = `<div class="state-msg">資料の読み込みに失敗しました。時間を置いて再度お試しください。</div>`;
      console.error(err);
    }
  }

  loadFiles();
</script>

</body>
</html>
